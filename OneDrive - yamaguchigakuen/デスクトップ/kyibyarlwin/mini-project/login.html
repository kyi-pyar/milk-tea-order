<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>login page</title>
</head>
<body>
    <form>
        <div>
            <input type="text" id="login_gmail" placeholder="Enter gmail">
            <div id="login_gmailMsg"></div>
        </div>
        <div>
            <input type="password" id="login_pwd" placeholder="Enter Password">
            <div id="login_pwdMsg"></div>
        </div>
        <div>
            <button type="submit" id="login_log" > Login</button>
            <button type="submit" id="login_cancel">Cancel</button>
        </div>
        

    </form>
    <div id="login_message"></div>
    <script src="login.js"></script>
</body>
</html>
